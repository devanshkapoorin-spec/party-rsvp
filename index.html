<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Party. — Party RSVP</title>
  <link rel="stylesheet" href="styles.css" />
  <title>Party. — RSVP</title>
</head>
<body>

<nav>
  <div class="inner">
    <a class="nav-logo" href="index.html">
      <img src="logo.svg" class="logo-mark" alt="" />
      <div class="logo-wordmark">
        <span class="logo-main">Party.</span>
        <span class="logo-sub">RSVP</span>
      </div>
    </a>
    <div class="nav-links">
      <a href="create.html">Host an event</a>
      <a href="admin.html">Admin</a>
    </div>
  </div>
</nav>

<div class="container">

  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;">
    <div>
      <h3>Upcoming Events</h3>
      <h1>You're <span class="grad">invited.</span> 🎊</h1>
      <p class="page-subtitle">Pick your event and secure your spot.</p>
    </div>
    <a href="create.html" class="btn btn-outline-pink" style="margin-top:8px;white-space:nowrap;">+ Host an event</a>
  </div>

  <div id="event-list" class="event-list fade-up">
    <div class="loading">Loading events…</div>
  </div>

</div>

<div class="page-footer">
  <div class="container">Party. &nbsp;·&nbsp; RSVP</div>
</div>

<div class="toast" id="toast"></div>
<script src="party.js"></script>
<script>
  async function loadEvents() {
    const list = document.getElementById('event-list');
    try {
      const res = await fetch('/api/events');
      const events = await res.json();

      if (!events.length) {
        list.innerHTML = '<div class="empty">No events yet.</div>';
        return;
      }

      list.innerHTML = events.map(ev => {
        const date = ev.date ? new Date(ev.date + 'T00:00:00').toLocaleDateString('en-US', {
          weekday: 'long', month: 'long', day: 'numeric'
        }) : '';
        return `
          <a class="event-card" href="event.html?id=${ev.id}">
            <div class="event-card-name">${ev.name}</div>
            <div class="event-card-meta">
              ${date ? `<span>📅 ${date}</span>` : ''}
              ${ev.location ? `<span>📍 ${ev.location}</span>` : ''}
            </div>
            ${ev['drinking event'] ? '<span class="event-card-tag">🍹 Drinks included</span>' : ''}
          </a>
        `;
      }).join('');
    } catch {
      list.innerHTML = '<div class="empty">Couldn\'t load events.</div>';
    }
  }

  loadEvents();
</script>

</body>
</html>
